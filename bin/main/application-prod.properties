spring.application.name=ecommerce-backend

# Production: values must be provided via environment
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Do not allow automatic schema changes in production
spring.jpa.hibernate.ddl-auto=validate

# Flyway migrations are handled externally in production (disable here)
spring.flyway.enabled=false

# JWT secret must come from env/secret manager
app.jwt.secret=${JWT_SECRET}

# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# Minimal logging override
logging.level.root=WARN
