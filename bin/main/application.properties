spring.application.name=ecommerce-backend

# Development defaults (kept minimal)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/infiniteprints_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA: dev uses update for convenience
spring.jpa.hibernate.ddl-auto=update

# Flyway disabled locally by default
spring.flyway.enabled=false

# JWT (dev) - rotate for production. Use a long random secret locally to satisfy signing key length.
app.jwt.secret=${JWT_SECRET:dev-secret-that-is-long-enough-for-dev-please-change-to-secure-64-characters!}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# CORS defaults for local development
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
app.cors.max-age=${CORS_MAX_AGE:3600}

# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# Minimal logging for dev
logging.level.root=INFO

# Expose actuator health and info under the application context
management.endpoints.web.exposure.include=health,info
# Map actuator to the application context path (so endpoints appear under /api/actuator)
management.server.servlet.context-path=/actuator
management.endpoint.health.show-details=always
