version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-infiniteprints_dev}
    ports:
      - "5432:5432"
    volumes:
      - db_data_local:/var/lib/postgresql/data
      - ./src/main/resources/db/seed:/docker-entrypoint-initdb.d:ro

  app:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-infiniteprints_dev}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  db_data_local:
