spring.application.name=infiniteprints-backend

# Production: values must be provided via environment
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection pooling for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.connection.timeout=10
spring.jpa.properties.hibernate.hikari.initialization-fail-timeout=0

# Flyway migrations are handled externally in production (disable here)
spring.flyway.enabled=false

# JWT secret must come from env/secret manager
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Server
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/api
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Logging (console only in production, Render collects from stdout)
logging.level.root=WARN
logging.level.com.infiniteprints=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
